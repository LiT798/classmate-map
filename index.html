<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同学地图 - 看看大家都在哪里发展</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h2>同学地图</h2>
      <p>请输入班级口令，查看同学们的分布情况</p>
      <form id="auth-form">
        <input type="password" id="auth-password" placeholder="班级口令" autocomplete="off" required>
        <p id="auth-error" class="auth-error" hidden>口令错误，请重试</p>
        <button type="submit" id="auth-submit">进入</button>
      </form>
    </div>
  </div>

  <div class="app" id="main-app" hidden>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>同学地图</h1>
        <p>看看大家都在哪里发展，方便线下交流</p>
      </div>

      <div class="controls">
        <input type="search" id="search-input" placeholder="搜索姓名、城市、领域...">
        <select id="field-filter">
          <option value="">全部领域</option>
        </select>
      </div>

      <div class="stats-section">
        <h3>城市分布</h3>
        <div class="stat-tags" id="city-stats"></div>
      </div>

      <div class="stats-section">
        <h3>领域分布</h3>
        <div class="stat-tags" id="field-stats"></div>
      </div>

      <div class="list-header">
        <span>同学列表</span>
        <span id="list-count">0 人</span>
      </div>

      <div class="classmate-list" id="classmate-list"></div>
    </aside>

    <main class="map-area">
      <div class="map-toolbar">
        <button type="button" id="sidebar-toggle">列表</button>
        <button type="button" id="theme-toggle">深色</button>
        <button type="button" id="logout-btn">退出</button>
      </div>
      <div id="map"></div>
    </main>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
